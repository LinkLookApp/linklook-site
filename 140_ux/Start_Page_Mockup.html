<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkLook — Start Page Mockup v2.0</title>
<style>
  /* ── LinkLook brand colors ──
     Primary green:    #4CAF76  (medium green — buttons, active states, accents)
     Creamy white:     #FAF8F4  (warm background)
     Card surface:     #F2EFE9  (slightly darker cream for cards)
     Item surface:     #FDFCFA  (near-white for list items inside cards)
     Logo green:       #2E7D4F  (dark green — "LinkLook" wordmark only)
     Text dark:        #2C2C2C  (headings, primary text)
     Text medium:      #6B6B6B  (body, secondary)
     Text light:       #9E9E9E  (placeholders, status labels)
     Green dark:       #3D8F62  (hover/pressed state)
     Green light:      #E8F5ED  (subtle green tint for top bar)
     Border:           #E5E0D8  (warm divider)
  */

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #e8e4de;
    color: #2C2C2C;
    display: flex;
    justify-content: center;
    padding: 20px;
    gap: 30px;
  }

  .mockup-label {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #6B6B6B;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .phone-frame {
    width: 390px;
    min-height: 844px;
    background: #FAF8F4;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    padding: 14px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: #2C2C2C;
  }

  /* Top omnibox bar */
  .top-bar {
    margin: 6px 16px 0;
    padding: 10px 14px;
    background: #E8F5ED;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #C8E6D0;
  }
  .nav-back {
    color: #2E7D4F;
    font-size: 20px;
    flex-shrink: 0;
    opacity: 0.35;
  }
  .nav-back.enabled {
    opacity: 1;
    cursor: pointer;
  }
  .address-field {
    flex: 1;
    font-size: 20px;  /* Large for elderly users — min 20pt */
    color: #9E9E9E;
    background: none;
    border: none;
    outline: none;
  }
  .go-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #4CAF76;
    color: white;
    border: none;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .go-btn:hover { background: #3D8F62; }
  .go-btn.hidden { display: none; }

  /* Content area */
  .content {
    flex: 1;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
  }

  /* App identity */
  .app-identity {
    text-align: center;
    margin-top: 20px;
    margin-bottom: 28px;
  }
  .app-identity h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    color: #2E7D4F;
  }
  .app-identity p {
    font-size: 16px;
    color: #6B6B6B;
    font-weight: 400;
  }

  /* Recent sites */
  .recent-card {
    background: #F2EFE9;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    margin-bottom: 24px;
  }
  .recent-card h3 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #2C2C2C;
  }
  .recent-item {
    background: #FDFCFA;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .recent-item:last-child { margin-bottom: 0; }
  .recent-item:hover { background: #F5F3EE; }
  .recent-item .domain {
    font-size: 15px;
    font-weight: 600;
    color: #2C2C2C;
  }
  .recent-item .status {
    font-size: 13px;
    color: #9E9E9E;
  }

  /* Browser toolbar (bottom, during browsing) */
  .browser-toolbar {
    border-top: 1px solid #E5E0D8;
    padding: 8px 16px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: #FAF8F4;
  }
  .toolbar-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #2E7D4F;
    cursor: pointer;
    border: none;
    background: none;
    border-radius: 8px;
  }
  .toolbar-btn:hover { background: #E8F5ED; }
  .toolbar-btn.disabled { opacity: 0.35; cursor: default; }
  .toolbar-btn.disabled:hover { background: none; }
  .toolbar-btn.browser-icon { color: #4CAF76; }

  /* Tab bar */
  .tab-bar {
    border-top: 1px solid #E5E0D8;
    padding: 10px 0 30px;
    display: flex;
    justify-content: space-around;
    background: #FAF8F4;
  }
  .tab-item {
    text-align: center;
    font-size: 11px;
    color: #9E9E9E;
    cursor: pointer;
    padding: 4px 16px;
  }
  .tab-item.active { color: #4CAF76; }
  .tab-item .tab-icon {
    font-size: 22px;
    margin-bottom: 2px;
    display: block;
  }

  /* Browsing state */
  .webview-placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    margin: 0;
    color: #9E9E9E;
    font-size: 14px;
    border-top: 1px solid #E5E0D8;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     MOCKUP 1: START PAGE (idle state)
     ═══════════════════════════════════════════════════════════════════════ -->

<div>
<div class="mockup-label">START PAGE (idle)</div>
<div class="phone-frame">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <span class="icons">●●● ▮▮▮ 🔋</span>
  </div>

  <!-- Omnibox (top bar) — back arrow + field + Go button -->
  <div class="top-bar">
    <span class="nav-back">←</span>
    <span class="address-field">Enter website or search</span>
    <button class="go-btn hidden" title="Go">→</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- App identity -->
    <div class="app-identity">
      <h1>LinkLook</h1>
      <p>A safety-driven browser</p>
    </div>

    <!-- No recent sites on Home screen — history is in the Recent tab only -->

  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab-item active">
      <span class="tab-icon">⌂</span>
      Home
    </div>
    <div class="tab-item">
      <span class="tab-icon">◷</span>
      Recent
    </div>
    <div class="tab-item">
      <span class="tab-icon">⚙</span>
      Settings
    </div>
  </div>

</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     MOCKUP 2: BROWSING STATE (with browser toolbar)
     ═══════════════════════════════════════════════════════════════════════ -->

<div>
<div class="mockup-label">BROWSING STATE</div>
<div class="phone-frame">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="time">9:42</span>
    <span class="icons">●●● ▮▮▮ 🔋</span>
  </div>

  <!-- Omnibox showing current URL -->
  <div class="top-bar">
    <span class="address-field" style="color: #2C2C2C;">https://bank.nl/login</span>
    <button class="go-btn" title="Go">→</button>
  </div>

  <!-- WebView placeholder -->
  <div class="webview-placeholder">
    <div style="text-align: center;">
      <div style="font-size: 40px; margin-bottom: 8px;">🌐</div>
      <div>Page content loads here</div>
    </div>
  </div>

  <!-- Browser toolbar: Back | Forward | Reload/Stop | Browser icon -->
  <div class="browser-toolbar">
    <button class="toolbar-btn" title="Back">←</button>
    <button class="toolbar-btn disabled" title="Forward">→</button>
    <button class="toolbar-btn" title="Reload">↻</button>
    <button class="toolbar-btn browser-icon" title="Open in Safari">🧭</button>
  </div>

  <!-- Tab bar — Settings icon shows chosen browser (Safari = 🧭) -->
  <div class="tab-bar">
    <div class="tab-item active">
      <span class="tab-icon">⌂</span>
      Home
    </div>
    <div class="tab-item">
      <span class="tab-icon">◷</span>
      Recent
    </div>
    <div class="tab-item">
      <span class="tab-icon">🧭</span>
      Settings
    </div>
  </div>

</div>
</div>

</body>
</html>
